<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CodeWise</title>
    <link rel="icon" type="image/png" href="home-page/images/codewise-monkey.png">
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    
    <link rel="stylesheet" href="src/assets/styles/home.css" />
    <script src="src/assets/js/theme-loader.js"></script>
    <link rel="stylesheet" href="src/assets/styles/theme.css" />
    <style>
      .home-homepage-skin {
        --cw-primary: #7c3aed;
        --cw-primary-light: #a78bfa;
        --cw-primary-dark: #6d28d9;
        --cw-secondary: #ec4899;
        --cw-accent: #f59e0b;
        --cw-success: #10b981;
        --cw-soft-primary: rgba(124, 58, 237, 0.08);
        --cw-soft-secondary: rgba(236, 72, 153, 0.06);
        --cw-muted: #6b7280;
        --cw-text: #1f2937;
        --cw-bg: #f8f6ff;
        --cw-surface: #ffffff;
        --cw-border: #e5e7eb;
        --cw-radius: 12px;
        --cw-shadow-sm: 0 2px 8px rgba(124, 58, 237, 0.1);
        --cw-shadow-md: 0 8px 24px rgba(124, 58, 237, 0.15);
        --cw-shadow-lg: 0 16px 48px rgba(124, 58, 237, 0.2);
        min-height: 100vh;
        color: var(--cw-text);
        background:
          radial-gradient(circle at 10% 16%, rgba(124, 58, 237, 0.1), transparent 26rem),
          radial-gradient(circle at 94% 4%, rgba(236, 72, 153, 0.12), transparent 24rem),
          linear-gradient(135deg, #ffffff 0%, var(--cw-bg) 100%);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        line-height: 1.6;
        overflow-x: hidden;
      }

      .home-homepage-skin::before {
        display: none;
      }

      .home-homepage-skin .header,
      .home-homepage-skin .sidebar,
      .home-homepage-skin .main-content,
      .home-homepage-skin .right-sidebar,
      .home-homepage-skin .trail-progress,
      .home-homepage-skin .stats,
      .home-homepage-skin .daily-missions,
      .home-homepage-skin .stat-item,
      .home-homepage-skin .mission-item,
      .home-homepage-skin .chat-modal {
        border-color: rgba(124, 58, 237, 0.15);
      }

      .home-homepage-skin .container {
        display: grid;
        grid-template-columns: 240px minmax(0, 1fr) 300px;
        grid-template-rows: auto 1fr;
        grid-template-areas:
          "header header header"
          "sidebar main right-sidebar";
        gap: 1.5rem;
        width: min(1440px, calc(100% - 3rem));
        max-width: 1440px;
        min-height: 100vh;
        margin: 0 auto;
        padding: 1rem 0 2rem;
      }

      .home-homepage-skin .header {
        grid-area: header;
        position: sticky;
        top: 0.75rem;
        right: auto;
        left: auto;
        z-index: 900;
        min-height: 78px;
        padding: 0.8rem 1.25rem;
        border: 1px solid rgba(124, 58, 237, 0.12);
        border-radius: var(--cw-radius);
        background: rgba(255, 255, 255, 0.95);
        box-shadow: var(--cw-shadow-md);
        backdrop-filter: blur(10px);
        transition: box-shadow 0.3s ease, border-color 0.3s ease;
      }

      .home-homepage-skin .header-title {
        display: flex;
        align-items: center;
        gap: 0.9rem;
      }

      .home-homepage-skin .header-title::before {
        content: "";
        display: block;
        width: 52px;
        height: 52px;
        background: url("home-page/images/logo-codewise.png") center / contain no-repeat;
        flex: 0 0 auto;
      }

      .home-homepage-skin .header h1 {
        margin: 0;
        color: var(--cw-text);
        font-size: clamp(1.35rem, 2vw, 1.8rem);
        font-weight: 900;
        line-height: 1.1;
        text-align: left;
        text-shadow: none;
        background: linear-gradient(135deg, var(--cw-primary) 0%, var(--cw-secondary) 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .home-homepage-skin .lives-pill {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 142px;
        padding: 0.72rem 1rem;
        border: 1px solid rgba(124, 58, 237, 0.16);
        border-radius: var(--cw-radius);
        background: var(--cw-surface);
        color: var(--cw-primary-dark);
        box-shadow: var(--cw-shadow-sm);
        font-weight: 900;
        line-height: 1;
      }

      .home-homepage-skin .sidebar,
      .home-homepage-skin .main-content,
      .home-homepage-skin .right-sidebar {
        border: 1px solid rgba(124, 58, 237, 0.12);
        border-radius: var(--cw-radius);
        background: rgba(255, 255, 255, 0.9);
        box-shadow: var(--cw-shadow-sm);
        backdrop-filter: blur(10px);
        transition: box-shadow 0.3s ease, border-color 0.3s ease;
      }

      .home-homepage-skin .sidebar {
        position: sticky;
        top: 104px;
        align-self: start;
        gap: 0.55rem;
        padding: 1rem;
        overflow: visible;
      }

      .home-homepage-skin .sidebar::before {
        content: "CodeWise";
        display: flex;
        align-items: center;
        min-height: 44px;
        margin-bottom: 0.45rem;
        padding: 0 0.75rem 0.85rem;
        border-bottom: 1px solid rgba(124, 58, 237, 0.12);
        font-size: 0.95rem;
        font-weight: 900;
        background: linear-gradient(135deg, var(--cw-primary) 0%, var(--cw-secondary) 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .home-homepage-skin .nav-item {
        position: relative;
        min-height: 52px;
        padding: 0.78rem 0.9rem;
        border: 1px solid transparent;
        border-radius: 12px;
        background: transparent;
        color: var(--cw-muted);
        font-size: 0.95rem;
        font-weight: 800;
        line-height: 1;
        box-shadow: none;
        outline: none;
        overflow: hidden;
        transition: color 0.3s ease, background 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease, transform 0.3s ease;
      }

      .home-homepage-skin .nav-item i {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 34px;
        height: 34px;
        min-width: 34px;
        border-radius: 10px;
        background: rgba(124, 58, 237, 0.08);
        color: var(--cw-primary);
        font-size: 1rem;
        transition: background 0.25s ease, color 0.25s ease, transform 0.25s ease;
      }

      .home-homepage-skin .nav-item:hover {
        transform: translateX(3px);
        border-color: rgba(124, 58, 237, 0.14);
        background: linear-gradient(135deg, rgba(124, 58, 237, 0.08), rgba(236, 72, 153, 0.06));
        color: var(--cw-primary-dark);
        box-shadow: 0 8px 18px rgba(124, 58, 237, 0.08);
      }

      .home-homepage-skin .nav-item:hover i {
        background: rgba(124, 58, 237, 0.14);
        transform: scale(1.04);
      }

      .home-homepage-skin .nav-item:focus-visible {
        border-color: rgba(124, 58, 237, 0.5);
        box-shadow: 0 0 0 4px rgba(124, 58, 237, 0.14);
      }

      .home-homepage-skin .nav-item.active {
        border-color: transparent;
        background: linear-gradient(135deg, var(--cw-primary) 0%, var(--cw-primary-dark) 100%);
        color: #fff;
        box-shadow: var(--cw-shadow-md);
      }

      .home-homepage-skin .nav-item.active::after {
        content: "";
        position: absolute;
        top: 12px;
        right: 10px;
        bottom: 12px;
        width: 3px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.75);
      }

      .home-homepage-skin .nav-item.active i {
        background: rgba(255, 255, 255, 0.18);
        color: #fff;
      }

      .home-homepage-skin .main-content {
        min-height: 620px;
        padding: 0;
        overflow: visible;
        box-shadow: var(--cw-shadow-md);
      }

      .home-homepage-skin .main-content:hover,
      .home-homepage-skin .right-sidebar:hover,
      .home-homepage-skin .sidebar:hover {
        border-color: rgba(124, 58, 237, 0.2);
        box-shadow: var(--cw-shadow-md);
      }

      .home-homepage-skin .knowledge-trail {
        position: relative;
        min-height: 100%;
        gap: 1.5rem;
        padding: 2rem;
        overflow: hidden;
        border-radius: var(--cw-radius);
        background:
          linear-gradient(135deg, rgba(124, 58, 237, 0.06) 0%, rgba(236, 72, 153, 0.06) 100%),
          var(--cw-surface);
      }

      .home-homepage-skin .knowledge-trail::before {
        content: "";
        position: absolute;
        top: -190px;
        right: -150px;
        width: 380px;
        height: 380px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(124, 58, 237, 0.13) 0%, transparent 70%);
        pointer-events: none;
      }

      .home-homepage-skin .knowledge-trail::after {
        content: "";
        position: absolute;
        bottom: -190px;
        left: -130px;
        width: 330px;
        height: 330px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(236, 72, 153, 0.11) 0%, transparent 70%);
        pointer-events: none;
      }

      .home-homepage-skin .knowledge-trail h2,
      .home-homepage-skin .trail-progress,
      .home-homepage-skin .exercise-tree {
        position: relative;
        z-index: 1;
      }

      .home-homepage-skin .knowledge-trail h2 {
        margin: 0;
        padding-bottom: 1.1rem;
        border-bottom: 1px solid rgba(124, 58, 237, 0.12);
        color: var(--cw-text);
        font-size: clamp(2rem, 4vw, 3.1rem);
        font-weight: 900;
        line-height: 1.08;
        text-align: left;
        background: linear-gradient(135deg, var(--cw-primary) 0%, var(--cw-secondary) 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .home-homepage-skin .trail-progress {
        display: grid;
        gap: 0.8rem;
        margin: 0;
        padding: 1rem;
        border: 1px solid rgba(124, 58, 237, 0.12);
        border-radius: var(--cw-radius);
        background: var(--cw-surface);
        box-shadow: var(--cw-shadow-sm);
        transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
      }

      .home-homepage-skin .trail-progress:hover {
        transform: translateY(-2px);
        border-color: rgba(124, 58, 237, 0.22);
        box-shadow: var(--cw-shadow-md);
      }

      .home-homepage-skin .trail-progress::before {
        content: "Seu progresso";
        width: fit-content;
        padding: 0.42rem 0.7rem;
        border-radius: 999px;
        background: var(--cw-soft-primary);
        color: var(--cw-primary-dark);
        font-size: 0.78rem;
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }

      .home-homepage-skin .trail-progress span {
        margin: 0;
        color: var(--cw-primary-dark);
        font-size: 0.95rem;
        font-weight: 900;
        text-align: left;
      }

      .home-homepage-skin .progress-bar-container {
        height: 13px;
        padding: 0;
        border: 1px solid rgba(124, 58, 237, 0.12);
        border-radius: 999px;
        background: #f1effb;
        box-shadow: inset 0 1px 2px rgba(31, 41, 55, 0.06);
        overflow: hidden;
      }

      .home-homepage-skin .progress-bar-fill {
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, var(--cw-primary), var(--cw-secondary));
        box-shadow: 0 0 14px rgba(124, 58, 237, 0.25);
      }

      .home-homepage-skin .exercise-tree {
        min-height: 430px;
        margin: 0 auto;
        padding: 1.5rem 0.5rem 0.9rem;
        gap: 2.25rem;
        scrollbar-color: var(--cw-primary) rgba(124, 58, 237, 0.08);
      }

      .home-homepage-skin .exercise-tree::-webkit-scrollbar {
        width: 8px;
      }

      .home-homepage-skin .exercise-tree::-webkit-scrollbar-track {
        background: rgba(124, 58, 237, 0.08);
        border-radius: 999px;
      }

      .home-homepage-skin .exercise-tree::-webkit-scrollbar-thumb {
        background: linear-gradient(180deg, var(--cw-primary), var(--cw-secondary));
        border-radius: 999px;
      }

      .home-homepage-skin .trail-item:not(:first-child)::after {
        bottom: calc(100% + 8px);
        height: 30px;
        width: 3px;
        background-image: linear-gradient(rgba(124, 58, 237, 0.34) 60%, transparent 40%);
        background-size: 3px 10px;
      }

      .home-homepage-skin .exercise-node {
        width: 74px;
        height: 74px;
        border-width: 3px;
        border-radius: 50%;
        background: #fff;
        box-shadow: var(--cw-shadow-md);
        font-size: 1.45rem;
        outline: none;
        transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease, background 0.3s ease, color 0.3s ease;
      }

      .home-homepage-skin .exercise-node:hover {
        transform: translateY(-3px) scale(1.04);
      }

      .home-homepage-skin .exercise-node:focus-visible {
        box-shadow: 0 0 0 5px rgba(124, 58, 237, 0.14), var(--cw-shadow-md);
      }

      .home-homepage-skin .exercise-node.completed {
        border-color: rgba(16, 185, 129, 0.3);
        background: rgba(16, 185, 129, 0.1);
        color: var(--cw-success);
      }

      .home-homepage-skin .exercise-node.current {
        border-color: rgba(255, 255, 255, 0.85);
        background: linear-gradient(135deg, var(--cw-primary) 0%, var(--cw-primary-dark) 100%);
        color: #fff;
        box-shadow: 0 14px 32px rgba(124, 58, 237, 0.32);
        animation: cw-current-pulse 2s ease-in-out infinite;
      }

      .home-homepage-skin .exercise-node.locked {
        border-color: #e5e7eb;
        background: #f9fafb;
        color: #9ca3af;
        box-shadow: 0 8px 18px rgba(31, 41, 55, 0.08);
        opacity: 1;
      }

      @keyframes cw-current-pulse {
        0%,
        100% {
          box-shadow: 0 14px 32px rgba(124, 58, 237, 0.28);
        }
        50% {
          box-shadow: 0 18px 42px rgba(124, 58, 237, 0.38);
        }
      }

      .home-homepage-skin .right-sidebar {
        gap: 1rem;
        padding: 1rem;
      }

      .home-homepage-skin .stats-missions-container {
        gap: 1rem;
        padding: 0;
        border: 0;
        border-radius: 0;
        background: transparent;
      }

      .home-homepage-skin .right-sidebar .lives-pill {
        width: 100%;
      }

      .home-homepage-skin .stats,
      .home-homepage-skin .daily-missions {
        border: 1px solid rgba(124, 58, 237, 0.12);
        border-radius: var(--cw-radius);
        background: var(--cw-surface);
        box-shadow: var(--cw-shadow-sm);
        transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
      }

      .home-homepage-skin .stats:hover,
      .home-homepage-skin .daily-missions:hover {
        transform: translateY(-2px);
        border-color: rgba(124, 58, 237, 0.22);
        box-shadow: var(--cw-shadow-md);
      }

      .home-homepage-skin .stats {
        gap: 0.75rem;
        padding: 1rem;
        border-bottom: 0;
      }

      .home-homepage-skin .stat-item {
        gap: 0.45rem;
        min-width: 86px;
        padding: 0.85rem 0.7rem;
        border: 1px solid rgba(124, 58, 237, 0.1);
        border-radius: var(--cw-radius);
        background: linear-gradient(135deg, var(--cw-soft-primary), var(--cw-soft-secondary));
        transition: transform 0.3s ease, border-color 0.3s ease;
      }

      .home-homepage-skin .stat-item:hover {
        transform: translateY(-2px);
        border-color: rgba(124, 58, 237, 0.2);
      }

      .home-homepage-skin .stat-link {
        text-decoration: none;
      }

      .home-homepage-skin .stat-icon {
        font-size: 1.7rem;
      }

      .home-homepage-skin .stat-value {
        color: var(--cw-primary-dark);
        font-weight: 900;
      }

      .home-homepage-skin .daily-missions {
        padding: 1rem;
      }

      .home-homepage-skin .daily-missions h3 {
        margin: 0 0 0.85rem;
        color: var(--cw-text);
        text-align: left;
        font-size: 1rem;
        font-weight: 900;
      }

      .home-homepage-skin .daily-missions h3::after {
        content: "";
        display: block;
        width: 44px;
        height: 3px;
        margin-top: 0.45rem;
        border-radius: 999px;
        background: linear-gradient(90deg, var(--cw-primary), var(--cw-secondary));
      }

      .home-homepage-skin .mission-list {
        gap: 0.7rem;
      }

      .home-homepage-skin .mission-item {
        align-items: flex-start;
        padding: 0.75rem;
        border: 1px solid rgba(124, 58, 237, 0.08);
        border-radius: 10px;
        background: linear-gradient(135deg, rgba(124, 58, 237, 0.06), rgba(236, 72, 153, 0.04));
        color: var(--cw-muted);
        line-height: 1.35;
        transition: transform 0.3s ease, border-color 0.3s ease, background 0.3s ease;
      }

      .home-homepage-skin .mission-item:hover {
        transform: translateX(4px);
        border-color: rgba(124, 58, 237, 0.18);
        background: linear-gradient(135deg, rgba(124, 58, 237, 0.1), rgba(236, 72, 153, 0.06));
      }

      .home-homepage-skin .mission-item span {
        color: inherit;
        font-weight: 700;
      }

      .home-homepage-skin .mission-item i {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 24px;
        height: 24px;
        min-width: 24px;
        border-radius: 999px;
        background: rgba(124, 58, 237, 0.1);
        color: var(--cw-primary);
      }

      .home-homepage-skin .mission-item.completed i {
        background: rgba(16, 185, 129, 0.12);
        color: var(--cw-success);
      }

      .home-homepage-skin .chat-float-button {
        right: 1.5rem;
        bottom: 1.5rem;
        width: 66px;
        height: 66px;
        border: 0;
        border-radius: 20px;
        background: linear-gradient(135deg, var(--cw-primary) 0%, var(--cw-primary-dark) 100%);
        box-shadow: 0 18px 40px rgba(124, 58, 237, 0.3);
        animation: cw-chat-float 3s ease-in-out infinite;
        overflow: visible;
      }

      .home-homepage-skin .chat-float-button::before {
        content: "";
        position: absolute;
        inset: -6px;
        border-radius: 24px;
        background: linear-gradient(135deg, rgba(124, 58, 237, 0.22), rgba(236, 72, 153, 0.18));
        opacity: 0.75;
        z-index: -1;
      }

      .home-homepage-skin .chat-float-button::after {
        content: "";
        position: absolute;
        top: 10px;
        right: 10px;
        width: 11px;
        height: 11px;
        border: 2px solid #fff;
        border-radius: 999px;
        background: var(--cw-success);
      }

      .home-homepage-skin .chat-float-button:hover {
        transform: translateY(-5px) scale(1.02);
        box-shadow: 0 24px 52px rgba(124, 58, 237, 0.36);
      }

      .home-homepage-skin .chat-float-button svg {
        width: 30px;
        height: 30px;
        fill: #fff;
      }

      @keyframes cw-chat-float {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-4px);
        }
      }

      .home-homepage-skin .chat-modal-overlay {
        inset: 0;
        display: none;
        align-items: stretch;
        justify-content: flex-end;
        padding: 1.25rem;
        background:
          radial-gradient(circle at 78% 14%, rgba(124, 58, 237, 0.22), transparent 24rem),
          rgba(31, 41, 55, 0.34);
        backdrop-filter: blur(10px);
      }

      .home-homepage-skin .chat-modal-overlay.active {
        display: flex;
      }

      .home-homepage-skin .chat-modal {
        width: min(var(--chat-width, 440px), calc(100vw - 2.5rem));
        height: min(780px, calc(100vh - 2.5rem));
        max-width: 540px;
        max-height: none;
        margin: auto 0 auto auto;
        border: 1px solid rgba(124, 58, 237, 0.18);
        border-radius: 18px;
        background: var(--cw-surface);
        box-shadow: var(--cw-shadow-lg);
        overflow: hidden;
        transform: translateX(18px) scale(0.98);
        transition: transform 0.25s ease;
      }

      .home-homepage-skin .chat-modal-overlay.active .chat-modal {
        transform: translateX(0) scale(1);
      }

      .home-homepage-skin .chat-modal-header {
        position: relative;
        padding: 1rem 1.15rem;
        border-bottom: 1px solid rgba(124, 58, 237, 0.12);
        background:
          linear-gradient(135deg, rgba(124, 58, 237, 0.1), rgba(236, 72, 153, 0.08)),
          #fff;
      }

      .home-homepage-skin .chat-modal-header::after {
        content: "";
        position: absolute;
        right: 0;
        bottom: -1px;
        left: 0;
        height: 3px;
        background: linear-gradient(90deg, var(--cw-primary), var(--cw-secondary));
      }

      .home-homepage-skin .chat-modal-header h2 {
        margin: 0;
        color: var(--cw-text);
        font-size: 1.08rem;
        font-weight: 900;
      }

      .home-homepage-skin .chat-modal-header h2 svg {
        width: 34px;
        height: 34px;
        padding: 6px;
        border-radius: 12px;
        background: linear-gradient(135deg, var(--cw-primary), var(--cw-secondary));
        fill: #fff;
        box-shadow: var(--cw-shadow-sm);
      }

      .home-homepage-skin .chat-close-btn {
        width: 40px;
        height: 40px;
        border: 1px solid rgba(124, 58, 237, 0.12);
        border-radius: 12px;
        background: #fff;
        color: var(--cw-muted);
        box-shadow: var(--cw-shadow-sm);
      }

      .home-homepage-skin .chat-close-btn:hover {
        border-color: rgba(236, 72, 153, 0.3);
        background: rgba(236, 72, 153, 0.08);
        color: var(--cw-secondary);
        transform: rotate(90deg);
      }

      .home-homepage-skin .chat-modal-body {
        padding: 1.15rem;
        gap: 0.9rem;
        background:
          radial-gradient(circle at 100% 0%, rgba(124, 58, 237, 0.08), transparent 16rem),
          radial-gradient(circle at 0% 100%, rgba(236, 72, 153, 0.07), transparent 16rem),
          #fbfaff;
        scrollbar-color: var(--cw-primary) rgba(124, 58, 237, 0.08);
      }

      .home-homepage-skin .chat-modal-body::-webkit-scrollbar {
        width: 8px;
      }

      .home-homepage-skin .chat-modal-body::-webkit-scrollbar-track {
        background: rgba(124, 58, 237, 0.08);
      }

      .home-homepage-skin .chat-modal-body::-webkit-scrollbar-thumb {
        background: linear-gradient(180deg, var(--cw-primary), var(--cw-secondary));
        border-radius: 999px;
      }

      .home-homepage-skin .message {
        max-width: 88%;
      }

      .home-homepage-skin .message-content {
        padding: 0.9rem 1rem;
        border-radius: 16px;
        font-size: 0.94rem;
        line-height: 1.55;
        box-shadow: var(--cw-shadow-sm);
        word-break: break-word;
      }

      .home-homepage-skin .message-content p {
        margin: 0 0 0.65rem;
      }

      .home-homepage-skin .message-content p:last-child {
        margin-bottom: 0;
      }

      .home-homepage-skin .message-content code {
        padding: 0.12rem 0.3rem;
        border-radius: 6px;
        background: rgba(124, 58, 237, 0.1);
        color: var(--cw-primary-dark);
        font-size: 0.9em;
      }

      .home-homepage-skin .message-content pre {
        margin: 0.7rem 0;
        padding: 0.8rem;
        border-radius: 10px;
        background: #1f2937;
        color: #f9fafb;
        overflow-x: auto;
      }

      .home-homepage-skin .message-content pre code {
        padding: 0;
        background: transparent;
        color: inherit;
      }

      .home-homepage-skin .message.assistant .message-content {
        border: 1px solid rgba(124, 58, 237, 0.12);
        border-bottom-left-radius: 6px;
        background: #fff;
        color: var(--cw-text);
      }

      .home-homepage-skin .message.user .message-content {
        border-bottom-right-radius: 6px;
        background: linear-gradient(135deg, var(--cw-primary) 0%, var(--cw-primary-dark) 100%);
        color: #fff;
        box-shadow: 0 10px 24px rgba(124, 58, 237, 0.2);
      }

      .home-homepage-skin .typing-indicator {
        display: inline-flex;
        gap: 0.35rem;
        align-items: center;
      }

      .home-homepage-skin .typing-indicator span {
        width: 7px;
        height: 7px;
        border-radius: 999px;
        background: var(--cw-primary);
        animation: cw-typing 1s ease-in-out infinite;
      }

      .home-homepage-skin .typing-indicator span:nth-child(2) {
        animation-delay: 0.12s;
      }

      .home-homepage-skin .typing-indicator span:nth-child(3) {
        animation-delay: 0.24s;
      }

      @keyframes cw-typing {
        0%,
        100% {
          opacity: 0.35;
          transform: translateY(0);
        }
        50% {
          opacity: 1;
          transform: translateY(-3px);
        }
      }

      .home-homepage-skin .chat-modal-footer {
        gap: 0.7rem;
        padding: 1rem;
        border-top: 1px solid rgba(124, 58, 237, 0.12);
        background: #fff;
      }

      .home-homepage-skin #chatInput {
        min-height: 48px;
        padding: 0 0.95rem;
        border: 1px solid rgba(124, 58, 237, 0.16);
        border-radius: 14px;
        background: #f9f7ff;
        color: var(--cw-text);
        font-size: 0.95rem;
        outline: none;
        box-shadow: inset 0 1px 2px rgba(31, 41, 55, 0.04);
      }

      .home-homepage-skin #chatInput:focus {
        border-color: var(--cw-primary);
        box-shadow: 0 0 0 4px rgba(124, 58, 237, 0.13);
      }

      .home-homepage-skin .chat-send-btn {
        width: 48px;
        height: 48px;
        border: 0;
        border-radius: 14px;
        background: linear-gradient(135deg, var(--cw-primary) 0%, var(--cw-primary-dark) 100%);
        color: #fff;
        box-shadow: var(--cw-shadow-md);
        flex: 0 0 48px;
      }

      .home-homepage-skin .chat-send-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 14px 30px rgba(124, 58, 237, 0.24);
      }

      .home-homepage-skin .chat-send-btn:focus-visible,
      .home-homepage-skin .chat-close-btn:focus-visible,
      .home-homepage-skin .chat-float-button:focus-visible {
        outline: none;
        box-shadow: 0 0 0 4px rgba(124, 58, 237, 0.16), var(--cw-shadow-md);
      }

      @media (max-width: 1200px) {
        .home-homepage-skin .container {
          grid-template-columns: 220px minmax(0, 1fr);
          grid-template-areas:
            "header header"
            "sidebar main"
            "sidebar right-sidebar";
        }
      }

      @media (max-width: 992px) {
        .home-homepage-skin .container {
          width: min(100% - 1rem, 760px);
          grid-template-columns: 1fr;
          grid-template-areas:
            "header"
            "main"
            "right-sidebar"
            "sidebar";
          padding-bottom: 86px;
        }

        .home-homepage-skin .header {
          top: 0.5rem;
          min-height: 68px;
        }

        .home-homepage-skin .header-title::before {
          width: 44px;
          height: 44px;
        }

        .home-homepage-skin .sidebar {
          position: fixed;
          right: 0;
          bottom: 0;
          left: 0;
          z-index: 1000;
          flex-direction: row;
          justify-content: space-around;
          align-items: center;
          height: 72px;
          padding: 0.5rem;
          border-radius: 16px 16px 0 0;
          background: rgba(255, 255, 255, 0.96);
          box-shadow: 0 -8px 24px rgba(124, 58, 237, 0.14);
          overflow-x: auto;
          scrollbar-width: none;
        }

        .home-homepage-skin .sidebar::-webkit-scrollbar,
        .home-homepage-skin .sidebar::before {
          display: none;
        }

        .home-homepage-skin .nav-item {
          min-width: 0;
          height: 100%;
          flex: 1;
          flex-direction: column;
          justify-content: center;
          gap: 0.25rem;
          padding: 0.35rem 0.2rem;
          border-radius: 12px;
          font-size: 0.72rem;
          text-align: center;
        }

        .home-homepage-skin .nav-item:hover {
          transform: none;
          box-shadow: none;
        }

        .home-homepage-skin .nav-item i {
          width: 28px;
          height: 28px;
          min-width: 28px;
          border-radius: 9px;
          font-size: 0.95rem;
        }

        .home-homepage-skin .nav-item.active::after {
          top: auto;
          right: 28%;
          bottom: 4px;
          left: 28%;
          width: auto;
          height: 3px;
        }

        .home-homepage-skin .main-content {
          min-height: 560px;
        }

        .home-homepage-skin .knowledge-trail {
          padding: 1.35rem;
        }
      }

      @media (max-width: 640px) {
        .home-homepage-skin .container {
          width: calc(100% - 0.75rem);
          gap: 1rem;
          padding-top: 0.5rem;
        }

        .home-homepage-skin .header {
          gap: 0.75rem;
          padding: 0.6rem 0.75rem;
        }

        .home-homepage-skin .lives-pill {
          min-width: 116px;
          padding: 0.6rem 0.7rem;
          font-size: 0.85rem;
        }

        .home-homepage-skin .knowledge-trail h2 {
          font-size: 1.9rem;
        }

        .home-homepage-skin .exercise-tree {
          min-height: 390px;
          gap: 1.7rem;
        }

        .home-homepage-skin .exercise-node {
          width: 60px;
          height: 60px;
          font-size: 1.15rem;
        }

        .home-homepage-skin .trail-item:not(:first-child)::after {
          height: 23px;
          bottom: calc(100% + 5px);
        }

        .home-homepage-skin .nav-item {
          font-size: 0;
        }

        .home-homepage-skin .nav-item i {
          font-size: 1.15rem;
        }

        .home-homepage-skin .chat-float-button {
          right: 1rem;
          bottom: 5.6rem;
          width: 56px;
          height: 56px;
          border-radius: 16px;
        }

        .home-homepage-skin .chat-modal-overlay {
          padding: 0.65rem;
        }

        .home-homepage-skin .chat-modal {
          width: 100%;
          height: calc(100vh - 1.3rem);
          margin: 0;
          border-radius: 14px;
        }
      }
    </style>
    <link rel="stylesheet" href="src/assets/styles/homepage-system.css" />
    <link rel="stylesheet" href="src/assets/styles/chat.css" />
  </head>
  <body class="home-homepage-skin cw-homepage-system">
    <div class="container">
      <header class="header">
        <div class="header-title">
          <img src="home-page/images/logo-codewise.png" alt="CodeWise" class="header-logo" />
          <h1>Home</h1>
        </div>
      </header>

      <nav class="sidebar">
        <button class="nav-item active" onclick="window.location.href='modulos.html'">
          <i class="fas fa-map"></i> Módulos
        </button>
        <button
          class="nav-item"
          data-route="/perfil"
          onclick="window.location.href='perfil.html'"
        >
          <i class="fas fa-user"></i> Perfil
        </button>
        <button
          class="nav-item"
          data-route="/loja"
          onclick="window.location.href='loja.html'"
        >
          <i class="fas fa-store"></i> Loja
        </button>
        <button
          class="nav-item"
          data-route="/rank"
          onclick="window.location.href='rank.html'"
        >
          <i class="fas fa-trophy"></i> Rank
        </button>
        <button
          class="nav-item"
          data-route="/calendario"
          onclick="window.location.href='calendario.html'"
        >
          <i class="fas fa-calendar-alt"></i> Calendário
        </button>
                  <button class="nav-item" onclick="window.location.href='estatisticas.html'">
            <i class="fas fa-chart-pie"></i> <span>Estatísticas</span>
          </button>
        <button
          class="nav-item"
          data-route="/configuracoes"
          onclick="window.location.href='configuracoes.html'"
        >
          <i class="fas fa-cog"></i> Configurações
        </button>
      </nav>

      <main class="main-content">
        <div class="knowledge-trail">
          <h2>Trilha de Conhecimento</h2>
          <div class="trail-progress">
            <span>Seu Progresso</span>
            <div class="progress-bar-container">
              <div class="progress-bar-fill" style="width: 20%"></div>
            </div>
          </div>

          <div class="exercise-tree">
            <div class="trail-item">
              <button class="exercise-node locked">
                <i class="fas fa-lock"></i>
              </button>
            </div>
            <div class="trail-item">
              <button class="exercise-node locked">
                <i class="fas fa-lock"></i>
              </button>
            </div>
            <div class="trail-item">
              <button class="exercise-node locked">
                <i class="fas fa-lock"></i>
              </button>
            </div>
            <div class="trail-item">
              <button
                class="exercise-node current"
                type="button"
                onclick="window.location.href='intro_modulo.html'"
                title="Iniciar lição e questionário"
                aria-label="Iniciar lição e questionário"
              >
                <i class="fas fa-pencil-alt"></i>
              </button>
            </div>
            <div class="trail-item">
              <button class="exercise-node completed">
                <i class="fas fa-check"></i>
              </button>
            </div>
          </div>
        </div>
      </main>

      <aside class="right-sidebar">
        <div class="stats-missions-container">
          <div class="stats">
            <div class="stat-item">
              <a href="calendario.html" class="stat-link">
                <span class="stat-icon">🔥</span>
              </a>
              <span class="stat-value">05</span>
            </div>
            <div class="stat-item">
              <span class="stat-icon">💎</span>
              <span class="stat-value">366</span>
            </div>
          </div>
          <div class="daily-missions">
            <h3>Missões Diárias</h3>
            <div class="mission-list">
              <div class="mission-item completed">
                <i class="fas fa-check-circle"></i>
                <span>Resolver 5 exercícios</span>
              </div>
              <div class="mission-item">
                <i class="far fa-circle"></i>
                <span>Avançar um módulo</span>
              </div>
            </div>
          </div>
        </div>

        </aside>
    </div>

    <div class="chat-float-button" id="chatFloatBtn">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
        <path
          d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z"
        />
      </svg>
    </div>

    <div class="chat-modal-overlay" id="chatModalOverlay">
      <div class="chat-modal">
        <div class="chat-resize-handle" id="chatResizeHandle" title="Arraste para redimensionar o chat"></div>
        <div class="chat-modal-header">
          <h2>
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
              <path
                d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-1-13h2v6h-2zm0 8h2v2h-2z"
              />
            </svg>
            CodeBuddy
          </h2>
          <button class="chat-close-btn" id="chatCloseBtn">
            <i class="fas fa-times"></i>
          </button>
        </div>

        <div class="chat-modal-body" id="chatMessages">
          <div class="message assistant">
            <div class="message-content">
              Olá! Sou seu assistente virtual, o CodeBuddy! Como posso te ajudar a programar
              hoje?
            </div>
          </div>
        </div>

        <div class="chat-modal-footer">
          <textarea
            id="chatInput"
            placeholder="Digite sua dúvida..."
            autocomplete="off"
            rows="1"
          ></textarea>
          <button class="chat-send-btn" id="chatSendBtn">
            <i class="fas fa-paper-plane"></i>
          </button>
        </div>
      </div>
    </div>

    <script src="src/services/codeBuddyContext.js"></script>
    <script src="src/pages/script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  </body>
</html>
