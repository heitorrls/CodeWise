<!DOCTYPE html>
<html lang="pt-BR" data-default-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CodeWise - Criar Nova Senha</title>
    <link rel="icon" type="image/png" href="home-page/images/codewise-monkey.png">
    <link rel="stylesheet" href="src/assets/styles/new-password.css" />
        <script src="src/assets/js/theme-loader.js"></script>
    <link rel="stylesheet" href="src/assets/styles/theme.css" />
    <link rel="stylesheet" href="src/assets/styles/homepage-system.css" />
  </head>
  <body class="cw-homepage-system" data-default-theme="light">
    <div class="theme-toggle-auth">
      <label class="toggle-switch">
        <input type="checkbox" id="authThemeToggle" data-setting="theme-light" />
        <span class="toggle-slider"></span>
      </label>
      <span class="toggle-label">Tema claro</span>
    </div>
    <div class="container">
      <div class="left-section">
        <button type="button" class="back-button" onclick="goBack()" aria-label="Voltar">
          <svg
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path
              d="M19 12H5M12 19L5 12L12 5"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </button>

        <div class="password-card">
          <h1 class="title">Criar nova senha</h1>

          <form id="newPasswordForm">
            <div class="input-group">
              <label for="newPassword">Nova Senha:</label>
              <input
                type="password"
                id="newPassword"
                name="newPassword"
                placeholder="Digite sua nova senha"
                required
              />
            </div>

            <div class="input-group">
              <label for="confirmPassword">Confirmar Senha:</label>
              <input
                type="password"
                id="confirmPassword"
                name="confirmPassword"
                placeholder="Confirme sua nova senha"
                required
              />
            </div>

            <button type="submit" class="confirm-btn">Confirmar</button>
          </form>
        </div>
      </div>

      <div class="right-section">
        <div class="mascot-container">
          <img
            src="src/assets/images/macaquinho-removebg-preview.png"
            alt="Mascote CodeWise"
          />
        </div>
      </div>
    </div>

    <script src="src/pages/script.js"></script>
  </body>
</html>
