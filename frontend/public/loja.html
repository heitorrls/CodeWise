<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Loja - CodeWise</title>
    <link rel="icon" type="image/png" href="home-page/images/codewise-monkey.png">
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="src/assets/styles/loja.css" />
        <script src="src/assets/js/theme-loader.js"></script>
    <link rel="stylesheet" href="src/assets/styles/theme.css" />
    <link rel="stylesheet" href="src/assets/styles/homepage-system.css" />
  </head>
  <body class="cw-homepage-system">
    <header class="header">
      <div class="header-title">
        <img src="home-page/images/logo-codewise.png" alt="CodeWise" class="header-logo" />
        <h1>Loja</h1>
      </div>
    </header>

    <div class="container">
      <nav class="sidebar">
        <button class="nav-item" onclick="window.location.href='modulos.html'">
          <i class="fas fa-map"></i> Módulos
        </button>
        <button class="nav-item" onclick="window.location.href='perfil.html'">
          <i class="fas fa-user"></i> Perfil
        </button>
        <button class="nav-item active">
          <i class="fas fa-store"></i> Loja
        </button>
        <button class="nav-item" onclick="window.location.href='rank.html'">
          <i class="fas fa-trophy"></i> Rank
        </button>
        <button class="nav-item" onclick="window.location.href='calendario.html'">
          <i class="fas fa-calendar-alt"></i> Calendário
        </button>
                  <button class="nav-item" onclick="window.location.href='estatisticas.html'">
            <i class="fas fa-chart-pie"></i> <span>Estatísticas</span>
          </button>
        <button
          class="nav-item"
          onclick="window.location.href='configuracoes.html'"
        >
          <i class="fas fa-cog"></i> Configurações
        </button>
      </nav>

      <main class="main-content">
        <div class="main-header">
          <h2 class="page-title">Loja</h2>
          <div class="balance-display">
            Seu Saldo: <span class="balance-amount">366</span>
            <span class="gem-icon">💎</span>
          </div>
        </div>

        <section class="store-section">
          <h3 class="section-title">Vidas</h3>
          <div class="items-grid">
            <div class="store-item">
              <div class="store-item-icon life">❤️</div>
              <h4 class="item-title">Recarga de Vidas</h4>
              <p class="item-description">
                Recarregue todas as suas vidas e continue aprendendo!
              </p>
              <button class="buy-button" data-price="50" data-type="utilizavel" data-name="Recarga de Vidas" data-description="Recarrega todas as vidas.">
                50 <span class="gem-icon">💎</span>
              </button>
            </div>
          </div>
        </section>

        <section class="store-section">
          <h3 class="section-title">Decorações da foto de perfil</h3>
          <div class="items-grid decorations">
            <div class="store-item">
              <div class="store-item-image profile-frame">
                <i class="fas fa-border-all"></i>
              </div>
              <h4 class="item-title">Moldura Dourada</h4>
              <p class="item-description">
                Uma moldura dourada para destacar sua foto de perfil.
              </p>
              <button class="buy-button" data-price="200" data-type="decoracao" data-name="Moldura Dourada" data-description="Moldura dourada para a foto de perfil." data-decoration-type="moldura-dourada">
                200 <span class="gem-icon">💎</span>
              </button>
            </div>

            <div class="store-item">
              <div class="store-item-image profile-overlay">
                <i class="fas fa-star"></i>
              </div>
              <h4 class="item-title">Overlay Estelar</h4>
              <p class="item-description">
                Estrelas decorativas aplicadas sobre sua foto de perfil.
              </p>
              <button class="buy-button" data-price="250" data-type="decoracao" data-name="Overlay Estelar" data-description="Overlay de estrelas para a foto de perfil." data-decoration-type="overlay-estelar">
                250 <span class="gem-icon">💎</span>
              </button>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script src="src/pages/script.js"></script>
  </body>
</html>
